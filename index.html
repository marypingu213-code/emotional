<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒紅綠燈互動教材</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const VolumeIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const RefreshIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
        const CheckIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const HeartIcon = ({ size = 24, fill = "none", className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>;
        const SettingsIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const TypeIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>;
        const GamepadIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;
        const KeyboardIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6.01" y2="8"></line><line x1="10" y1="8" x2="10.01" y2="8"></line><line x1="14" y1="8" x2="14.01" y2="8"></line><line x1="18" y1="8" x2="18.01" y2="8"></line><line x1="8" y1="12" x2="8.01" y2="12"></line><line x1="12" y1="12" x2="12.01" y2="12"></line><line x1="16" y1="12" x2="16.01" y2="12"></line><line x1="7" y1="16" x2="17" y2="16"></line></svg>;

        const App = () => {
          const [currentStep, setCurrentStep] = useState('checkIn');
          const [selectedEmotion, setSelectedEmotion] = useState(null);
          const [selectedStrategy, setSelectedStrategy] = useState(null);
          const [pitch, setPitch] = useState(1);
          const [voices, setVoices] = useState([]);
          const [selectedVoiceURI, setSelectedVoiceURI] = useState('');
          const [font, setFont] = useState('sans');

          // 🎮 新增：支援鍵盤與特教開關模式
          const [activeInput, setActiveInput] = useState('none'); // 'none', 'gamepad', 'keyboard'
          const [focusIndex, setFocusIndex] = useState(0); 
          const [popTrigger, setPopTrigger] = useState(0); 
          
          const appStateRef = useRef({ currentStep, focusIndex });
          useEffect(() => {
            appStateRef.current = { currentStep, focusIndex };
          }, [currentStep, focusIndex]);

          useEffect(() => {
            setFocusIndex(0);
          }, [currentStep]);

          // ⌨️ 鍵盤輔具支援 (完美模擬特教單鍵開關)
          useEffect(() => {
            const handleKeyDown = (e) => {
              // 忽略設定面板的按鍵干擾
              if(e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
              
              setActiveInput('keyboard');
              const state = appStateRef.current;
              const maxIndex = (state.currentStep === 'checkIn' || state.currentStep === 'strategy') ? 2 : 0;

              if (e.key === 'ArrowLeft') {
                e.preventDefault();
                setFocusIndex(prev => Math.max(0, prev - 1));
              } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                setFocusIndex(prev => Math.min(maxIndex, prev + 1));
              } else if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const targetButton = document.getElementById(`item-${state.focusIndex}`);
                if (targetButton) targetButton.click();
              }

              // 冷靜階段：任何鍵都能觸發泡泡
              if (state.currentStep === 'coolDown') {
                 setPopTrigger(t => t + 1);
              }
            };
            
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, []);

          // 🎮 手把輪詢系統 (保留給接線或配對成功的狀況)
          useEffect(() => {
            let rAF;
            let prevBtns = Array(20).fill(false);
            let prevAxes = [0, 0, 0, 0];

            const pollGamepad = () => {
              const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
              const gp = gamepads.find(g => g !== null);

              if (gp) {
                if (activeInput !== 'gamepad') setActiveInput('gamepad');

                const pressed = gp.buttons.map(b => b.pressed);
                const state = appStateRef.current;
                const maxIndex = (state.currentStep === 'checkIn' || state.currentStep === 'strategy') ? 2 : 0;

                const left = pressed[14] || gp.axes[0] < -0.5;
                const right = pressed[15] || gp.axes[0] > 0.5;
                const prevLeft = prevBtns[14] || prevAxes[0] < -0.5;
                const prevRight = prevBtns[15] || prevAxes[0] > 0.5;

                if (left && !prevLeft) setFocusIndex(prev => Math.max(0, prev - 1));
                if (right && !prevRight) setFocusIndex(prev => Math.min(maxIndex, prev + 1));

                const select = pressed[0] || pressed[1] || pressed[2] || pressed[3];
                const prevSelect = prevBtns[0] || prevBtns[1] || prevBtns[2] || prevBtns[3];

                if (select && !prevSelect) {
                   const targetButton = document.getElementById(`item-${state.focusIndex}`);
                   if (targetButton) targetButton.click();
                }

                const anyNewPress = pressed.some((p, i) => p && !prevBtns[i]);
                if (anyNewPress && state.currentStep === 'coolDown') {
                   setPopTrigger(t => t + 1);
                }

                prevBtns = pressed;
                prevAxes = [...gp.axes];
              }
              rAF = requestAnimationFrame(pollGamepad);
            };

            rAF = requestAnimationFrame(pollGamepad);
            return () => cancelAnimationFrame(rAF);
          }, [activeInput]);

          const getFontFamily = () => {
            switch(font) {
              case 'kai': return '"BiauKai", "DFKai-sb", serif';
              case 'round': return '"cwTeXYen", "Arial Rounded MT Bold", "Varela Round", sans-serif';
              case 'zhuyin': return '"文鼎標楷注音", "AR BiauKai Zhuyin", "BPMF Kai", "BPMF", "王漢宗中明注音體", "王漢宗中楷注音", "DFBopomofo-W5", "BiauKai", serif';
              case 'sans':
              default: return 'ui-sans-serif, system-ui, sans-serif';
            }
          };

          const Fix = ({ char, z }) => {
            if (font !== 'zhuyin') return <React.Fragment>{char}</React.Fragment>;
            return (
              <span className="relative inline-flex items-center justify-center mr-[0.6em]" style={{ fontFamily: '"BiauKai", "DFKai-sb", serif' }}>
                <span>{char}</span>
                <span className="absolute left-full top-1/2 -translate-y-1/2 flex flex-col items-center justify-center text-[0.35em] leading-tight ml-[2px] tracking-tighter">
                  {z.split('').map((symbol, i) => (
                    <span key={i} className="block text-center font-normal">{symbol}</span>
                  ))}
                </span>
              </span>
            );
          };

          useEffect(() => {
            const loadVoices = () => {
              const availableVoices = window.speechSynthesis.getVoices();
              const chineseVoices = availableVoices.filter(v => v.lang.includes('zh'));
              setVoices(chineseVoices);
              
              if (chineseVoices.length > 0 && !selectedVoiceURI) {
                const defaultVoice = chineseVoices.find(v => v.name.includes('Google') || v.name.includes('Mei-Jia')) || chineseVoices[0];
                setSelectedVoiceURI(defaultVoice.voiceURI);
              }
            };

            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
              window.speechSynthesis.onvoiceschanged = loadVoices;
            }
          }, [selectedVoiceURI]);

          const speak = (text) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'zh-TW';
              utterance.rate = 0.9;
              utterance.pitch = pitch;
              if (selectedVoiceURI) {
                const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                if (voice) utterance.voice = voice;
              }
              window.speechSynthesis.speak(utterance);
            }
          };

          const emotions = {
            green: { 
              id: 'green', color: 'bg-green-100 border-green-500 text-green-700 hover:bg-green-200', 
              icon: '😊', name: '綠燈', label: <React.Fragment>綠燈：平靜、開心</React.Fragment>, 
              desc: <React.Fragment>我現在感<Fix char="覺" z="ㄐㄩㄝˊ"/>很好，可以專心上課。</React.Fragment>,
              speech: '我現在感覺很好，是綠燈。'
            },
            yellow: { 
              id: 'yellow', color: 'bg-yellow-100 border-yellow-500 text-yellow-800 hover:bg-yellow-200', 
              icon: '😟', name: '黃燈', label: <React.Fragment>黃燈：緊張、煩躁</React.Fragment>, 
              desc: <React.Fragment>我有點不舒服，需要一點幫助。</React.Fragment>,
              speech: '我有點煩躁或緊張，是黃燈。'
            },
            red: { 
              id: 'red', color: 'bg-red-100 border-red-500 text-red-700 hover:bg-red-200', 
              icon: '😡', name: '紅燈', label: <React.Fragment>紅燈：生氣、失控</React.Fragment>, 
              desc: <React.Fragment>我非常生氣！我需要馬上休息！</React.Fragment>,
              speech: '我非常生氣！是紅燈。'
            }
          };

          const strategies = {
            yellow: [
              { id: 'water', icon: '🥤', label: <React.Fragment>喝口水</React.Fragment>, speech: '喝口水', toolType: 'timer', time: 10 },
              { id: 'breathe', icon: '🌬️', label: <React.Fragment>深呼吸</React.Fragment>, speech: '跟著氣球深呼吸', toolType: 'breathing' },
              { id: 'stretch', icon: '🤸', label: <React.Fragment>伸展身體</React.Fragment>, speech: '站起來伸展身體', toolType: 'timer', time: 15 }
            ],
            red: [
              { id: 'quiet', icon: '🪑', label: <React.Fragment>去冷靜區</React.Fragment>, speech: '去冷靜區休息', toolType: 'timer', time: 20 },
              { id: 'headphones', icon: '🎧', label: <React.Fragment>聽音<Fix char="樂" z="ㄩㄝˋ"/></React.Fragment>, speech: '戴上耳機聽音樂', toolType: 'music', time: 20 },
              { id: 'toy', icon: '🧸', label: <React.Fragment>按舒壓泡泡</React.Fragment>, speech: '來按舒壓泡泡吧', toolType: 'popit' }
            ]
          };

          const handleEmotionSelect = (emotionId) => {
            const emotion = emotions[emotionId];
            setSelectedEmotion(emotion);
            speak(emotion.speech);
            
            setTimeout(() => {
              if (emotionId === 'green') {
                setCurrentStep('wellDone');
                speak('太棒了！保持這個好心情繼續學習吧！');
              } else {
                setCurrentStep('strategy');
                speak('你需要什麼幫助呢？請選一個方法。');
              }
            }, 1500);
          };

          const handleStrategySelect = (strategy) => {
            setSelectedStrategy(strategy);
            speak(`好的，我們來${strategy.speech}`);
            setCurrentStep('coolDown');
          };

          const resetApp = () => {
            setCurrentStep('checkIn');
            setSelectedEmotion(null);
            setSelectedStrategy(null);
            setActiveInput('none'); // 取消焦點
            speak('你現在感覺怎麼樣？');
          };

          const SettingsPanel = () => (
            <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 items-end">
              {voices.length > 0 && (
                <select
                  value={selectedVoiceURI}
                  onChange={(e) => {
                    setSelectedVoiceURI(e.target.value);
                    if ('speechSynthesis' in window) {
                      window.speechSynthesis.cancel();
                      const u = new SpeechSynthesisUtterance('這是我新的聲音，聽起來親切嗎？');
                      const selectedV = voices.find(v => v.voiceURI === e.target.value);
                      if (selectedV) u.voice = selectedV;
                      u.pitch = pitch;
                      u.rate = 0.9;
                      window.speechSynthesis.speak(u);
                    }
                  }}
                  className="bg-white/90 px-3 py-2 rounded-xl shadow-md text-sm font-bold text-gray-700 border-2 border-gray-200 outline-none cursor-pointer max-w-[200px] truncate"
                  title="選擇發音人"
                >
                  {voices.map(v => (
                    <option key={v.voiceURI} value={v.voiceURI}>
                      🗣️ {v.name}
                    </option>
                  ))}
                </select>
              )}

              <div className="flex gap-2">
                <button
                  onClick={() => {
                    const nextFont = font === 'sans' ? 'kai' : font === 'kai' ? 'round' : font === 'round' ? 'zhuyin' : 'sans';
                    setFont(nextFont);
                  }}
                  className="flex items-center gap-2 bg-white/90 px-4 py-2 rounded-full shadow-md text-sm font-bold text-gray-700 hover:bg-gray-50 border-2 border-gray-200 transition-all"
                  title="切換字體"
                >
                  <TypeIcon size={18} />
                  字體: {font === 'sans' ? '黑體' : font === 'kai' ? '標楷體' : font === 'round' ? '圓體' : '注音體'}
                </button>

                <button
                  onClick={() => {
                    const nextPitch = pitch === 1 ? 1.5 : pitch === 1.5 ? 0.8 : 1;
                    setPitch(nextPitch);
                    if ('speechSynthesis' in window) {
                      window.speechSynthesis.cancel();
                      const u = new SpeechSynthesisUtterance(nextPitch === 1 ? '正常音調' : nextPitch === 1.5 ? '可愛高音' : '沉穩低音');
                      if (selectedVoiceURI) {
                        const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                        if (voice) u.voice = voice;
                      }
                      u.lang = 'zh-TW';
                      u.rate = 0.9;
                      u.pitch = nextPitch;
                      window.speechSynthesis.speak(u);
                    }
                  }}
                  className="flex items-center gap-2 bg-white/90 px-4 py-2 rounded-full shadow-md text-sm font-bold text-gray-700 hover:bg-gray-50 border-2 border-gray-200 transition-all"
                  title="切換語音音調"
                >
                  <SettingsIcon size={18} />
                  音調: {pitch === 1 ? '正常' : pitch === 1.5 ? '可愛(高)' : '沉穩(低)'}
                </button>
              </div>
              
              {font === 'zhuyin' && (
                <div className="mt-2 text-xs text-orange-600 bg-orange-100 p-2.5 rounded-lg border border-orange-300 shadow-sm max-w-[280px] text-left animate-pulse">
                  💡 <b>展示提醒：</b><br/>
                  請確認本機已安裝「文鼎標楷注音」字型。若未安裝，系統已啟動降級顯示。
                </div>
              )}
            </div>
          );

          const PopItTool = ({ trigger }) => {
            const [bubbles, setBubbles] = useState(Array(12).fill(false));
            
            const playPopSound = (isPop) => {
              try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(isPop ? 600 : 400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(isPop ? 300 : 200, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
              } catch (e) { console.log("音效播放失敗", e); }
            };

            const toggle = (i) => {
              setBubbles(prev => {
                const next = [...prev];
                next[i] = !next[i];
                playPopSound(next[i]);
                return next;
              });
            };

            useEffect(() => {
              if (trigger > 0) {
                setBubbles(prev => {
                  const next = [...prev];
                  const unpopped = next.map((b, i) => !b ? i : -1).filter(i => i !== -1);
                  
                  if (unpopped.length === 0) {
                    playPopSound(false);
                    return Array(12).fill(false);
                  }
                  
                  const randomTarget = unpopped[Math.floor(Math.random() * unpopped.length)];
                  next[randomTarget] = true;
                  playPopSound(true);
                  return next;
                });
              }
            }, [trigger]);

            return (
              <div className="grid grid-cols-4 gap-4 my-8 p-6 bg-pink-50 rounded-3xl border-4 border-pink-200 shadow-inner w-full max-w-sm mx-auto">
                {bubbles.map((popped, i) => (
                  <button
                    key={i}
                    onClick={() => toggle(i)}
                    className={`w-16 h-16 rounded-full transition-all duration-200 shadow-md mx-auto focus:outline-none ${
                      popped ? 'bg-pink-400 scale-90 shadow-inner' : 'bg-pink-200 scale-100 hover:bg-pink-300'
                    }`}
                  />
                ))}
              </div>
            );
          };

          const BreathingTool = () => {
            const [phase, setPhase] = useState('吸氣');
            
            useEffect(() => {
              const interval = setInterval(() => {
                setPhase(p => p === '吸氣' ? '吐氣' : '吸氣');
              }, 4000);
              return () => clearInterval(interval);
            }, []);

            return (
              <div className="my-16 flex flex-col items-center">
                <div className="relative w-48 h-48 flex items-center justify-center">
                  <div className={`absolute w-full h-full bg-blue-300 rounded-full opacity-40 transition-all duration-[4000ms] ease-in-out ${phase === '吸氣' ? 'scale-150' : 'scale-75'}`}></div>
                  <div className={`absolute w-3/4 h-3/4 bg-blue-500 rounded-full shadow-lg flex items-center justify-center transition-all duration-[4000ms] ease-in-out ${phase === '吸氣' ? 'scale-125' : 'scale-90'}`}>
                     <span className="text-white text-4xl font-bold tracking-widest">{phase}</span>
                  </div>
                </div>
                <p className="mt-20 text-2xl text-gray-600 font-bold animate-pulse">跟著氣球慢慢呼吸...</p>
              </div>
            );
          };

          const VisualTimer = ({ seconds }) => {
            const [timeLeft, setTimeLeft] = useState(seconds);
            
            useEffect(() => {
              if (timeLeft <= 0) return;
              const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
              return () => clearInterval(timer);
            }, [timeLeft]);

            const percentage = (timeLeft / seconds) * 100;
            
            return (
              <div className="my-10 flex flex-col items-center">
                <div 
                  className="relative w-48 h-48 rounded-full bg-gray-200 border-8 border-gray-100 flex items-center justify-center overflow-hidden transition-all duration-1000" 
                  style={{ background: `conic-gradient(#4ADE80 ${percentage}%, #E5E7EB ${percentage}%)` }}
                >
                  <div className="w-36 h-36 bg-white rounded-full flex items-center justify-center shadow-inner">
                    <span className="text-5xl font-bold text-gray-700">{timeLeft}s</span>
                  </div>
                </div>
                <p className="mt-6 text-xl text-gray-500">休息一下，等綠色倒<Fix char="數" z="ㄕㄨˇ"/>完畢...</p>
              </div>
            );
          };

          const MusicTool = ({ seconds }) => {
            const [audioSrc, setAudioSrc] = useState(null);
            const fileInputRef = useRef(null);

            const handleFileChange = (e) => {
              const file = e.target.files[0];
              if (file) {
                const url = URL.createObjectURL(file);
                setAudioSrc(url);
              }
            };

            useEffect(() => {
              return () => {
                if (audioSrc) URL.revokeObjectURL(audioSrc);
              };
            }, [audioSrc]);

            return (
              <div className="flex flex-col items-center w-full">
                <div className="bg-blue-50 p-6 rounded-3xl mb-2 shadow-sm w-full max-w-sm flex flex-col items-center gap-4 border-2 border-blue-200">
                  <div className="flex items-center gap-3">
                    <span className="text-4xl animate-bounce">🎵</span>
                    <span className="text-4xl animate-bounce" style={{ animationDelay: '0.2s' }}>🎧</span>
                    <span className="text-4xl animate-bounce" style={{ animationDelay: '0.4s' }}>🧸</span>
                  </div>
                  <p className="text-blue-800 font-bold text-lg tracking-wider">專屬冷靜音樂</p>
                  
                  {audioSrc ? (
                    <audio controls autoPlay loop className="w-full h-12 rounded-full shadow-inner" src={audioSrc}>
                      您的瀏覽器不支援音樂播放
                    </audio>
                  ) : (
                    <div className="flex flex-col items-center gap-3 w-full animate-fade-in">
                      <p className="text-sm text-gray-600 font-bold">請選擇學生最熟悉的聲音：</p>
                      <input type="file" accept="audio/*" className="hidden" ref={fileInputRef} onChange={handleFileChange} />
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        className="w-full py-3 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600 shadow-md transform hover:scale-105 transition-all text-lg font-bold flex items-center justify-center gap-2"
                      >
                        📁 載入本機音檔
                      </button>
                      <p className="text-xs text-indigo-400 mt-1">支援一般音樂或家長錄音檔，保護隱私不耗流量</p>
                    </div>
                  )}
                </div>
                <VisualTimer seconds={seconds} />
              </div>
            );
          };

          const getFocusStyle = (index) => {
            return (activeInput !== 'none' && focusIndex === index) 
              ? 'ring-8 ring-blue-500 ring-offset-4 scale-105 z-10 transform transition-all border-blue-500' 
              : '';
          };

          return (
            <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-6 relative overflow-hidden" style={{ fontFamily: getFontFamily() }}>
              <SettingsPanel />
              
              {activeInput === 'gamepad' && (
                <div className="fixed top-4 left-4 z-50 flex items-center gap-2 bg-green-100 text-green-700 px-4 py-2 rounded-full shadow border-2 border-green-300 font-bold animate-bounce">
                  <GamepadIcon size={24} /> 已偵測到遊戲手把
                </div>
              )}
              {activeInput === 'keyboard' && (
                <div className="fixed top-4 left-4 z-50 flex items-center gap-2 bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full shadow border-2 border-indigo-300 font-bold animate-bounce">
                  <KeyboardIcon size={24} /> 已啟用特教鍵盤/單鍵輔具模式
                </div>
              )}

              {currentStep === 'checkIn' && (
                <div className="max-w-3xl w-full bg-white rounded-3xl shadow-xl overflow-hidden p-8 text-center border-4 border-blue-200">
                  <div className="flex items-center justify-center gap-4 mb-8">
                    <h1 className="text-4xl md:text-5xl font-bold text-blue-800">你現在感<Fix char="覺" z="ㄐㄩㄝˊ"/>怎麼樣？</h1>
                    <button onClick={() => speak('你現在感覺怎麼樣？')} className="p-3 bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 transition-colors" title="朗讀題目">
                      <VolumeIcon size={32} />
                    </button>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {Object.values(emotions).map((emo, idx) => (
                      <button id={`item-${idx}`} key={emo.id} onClick={() => handleEmotionSelect(emo.id)} className={`flex flex-col items-center justify-center p-8 rounded-2xl border-4 transition-all hover:scale-105 focus:outline-none ${emo.color} ${getFocusStyle(idx)}`}>
                        <span className="text-8xl mb-4">{emo.icon}</span>
                        <span className="text-2xl font-bold mb-2">{emo.label}</span>
                        <span className="text-lg opacity-80">{emo.desc}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {currentStep === 'strategy' && (
                <div className="max-w-3xl w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-blue-200">
                  <div className="mb-8">
                    <span className="text-6xl mb-4 block">{selectedEmotion.icon}</span>
                    <div className="flex items-center justify-center gap-4">
                      <h2 className="text-3xl font-bold text-gray-800">你現在是{selectedEmotion.name}，請選一個方法幫助自己：</h2>
                      <button onClick={() => speak('請選一個方法幫助自己')} className="p-2 bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition-colors">
                        <VolumeIcon size={28} />
                      </button>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {strategies[selectedEmotion.id].map((strat, idx) => (
                      <button id={`item-${idx}`} key={strat.id} onClick={() => handleStrategySelect(strat)} className={`flex flex-col items-center p-6 bg-indigo-50 border-4 border-indigo-200 rounded-2xl hover:bg-indigo-100 hover:border-indigo-400 transition-all focus:outline-none hover:-translate-y-1 ${getFocusStyle(idx)}`}>
                        <span className="text-7xl mb-4">{strat.icon}</span>
                        <span className="text-2xl font-bold text-indigo-900">{strat.label}</span>
                      </button>
                    ))}
                  </div>

                  <button onClick={resetApp} className="mt-10 px-6 py-3 bg-gray-200 text-gray-700 text-xl font-bold rounded-xl hover:bg-gray-300 flex items-center justify-center mx-auto gap-2 focus:outline-none">
                    <RefreshIcon size={24} /> 重新選擇心情
                  </button>
                </div>
              )}

              {currentStep === 'coolDown' && (
                <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-10 text-center border-4 border-indigo-300">
                  <h2 className="text-4xl font-bold text-indigo-900 mb-6 flex justify-center items-center gap-3">
                    正在執行：{selectedStrategy.label}
                    <button onClick={() => speak(`正在執行${selectedStrategy.speech}`)} className="text-indigo-500 hover:text-indigo-700 focus:outline-none">
                       <VolumeIcon size={32} />
                    </button>
                  </h2>
                  
                  <div className="min-h-[300px] flex items-center justify-center w-full">
                    {selectedStrategy.toolType === 'popit' && <PopItTool trigger={popTrigger} />}
                    {selectedStrategy.toolType === 'breathing' && <BreathingTool />}
                    {selectedStrategy.toolType === 'timer' && <VisualTimer seconds={selectedStrategy.time} />}
                    {selectedStrategy.toolType === 'music' && <MusicTool seconds={selectedStrategy.time} />}
                  </div>

                  <button id="item-0" onClick={() => { setCurrentStep('wellDone'); speak('我感覺好多了！太棒了！'); }} className={`w-full py-5 bg-green-500 text-white text-3xl font-bold rounded-2xl hover:bg-green-600 shadow-lg transform hover:scale-105 transition-all flex justify-center items-center gap-3 mt-8 focus:outline-none ${getFocusStyle(0)}`}>
                    <CheckIcon size={40} /> 我感覺好多了！
                  </button>
                </div>
              )}

              {currentStep === 'wellDone' && (
                <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-12 text-center border-4 border-green-300">
                  <div className="text-red-500 flex justify-center mb-6 animate-pulse">
                    <HeartIcon size={100} fill="currentColor" />
                  </div>
                  <h1 className="text-5xl font-bold text-green-700 mb-6">太棒了！</h1>
                  <p className="text-3xl text-gray-700 mb-12">
                    你很棒，能察<Fix char="覺" z="ㄐㄩㄝˊ"/>自己的情緒，並且把自己照顧得很好！
                  </p>
                  
                  <button id="item-0" onClick={resetApp} className={`px-8 py-4 bg-blue-500 text-white text-2xl font-bold rounded-2xl hover:bg-blue-600 shadow-lg transform hover:scale-105 transition-all flex justify-center items-center mx-auto gap-3 focus:outline-none ${getFocusStyle(0)}`}>
                    <RefreshIcon size={32} /> 回到首頁
                  </button>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
