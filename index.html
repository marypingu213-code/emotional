<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情緒紅綠燈互動教材</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 🏆 UDL 平板/大電視防護機制：完全禁用滑動、縮放與文字反白 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden !important; 
            touch-action: none !important; 
            user-select: none;
            overscroll-behavior: none; /* 🏆 徹底阻斷平板與筆電的邊緣滑動回彈 */
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        #root { 
            height: 100%; 
            width: 100%; 
            display: flex; 
        }
        /* 隱藏捲軸 */
        ::-webkit-scrollbar { display: none; }

        /* 🏆 補齊缺少的泡泡專屬 CSS 特效 */
        /* 🌈 彩虹泡泡顏色 */
        .bubble-color-0 { background-color: #ff9999; } /* 柔和粉紅 */
        .bubble-color-1 { background-color: #ffc966; } /* 柔和橘色 */
        .bubble-color-2 { background-color: #ffff99; } /* 柔和黃色 */
        .bubble-color-3 { background-color: #99ff99; } /* 柔和綠色 */
        .bubble-color-4 { background-color: #99ccff; } /* 柔和藍色 */
        .bubble-color-5 { background-color: #cc99ff; } /* 柔和紫色 */
        
        /* ✨ 發光藍泡泡特效 */
        .glow-bubble { 
            background-color: #312e81; 
            border: 2px solid #818cf8; 
            box-shadow: 0 0 10px #6366f1; 
        }
        .glow-popped { 
            background-color: #818cf8; 
            box-shadow: inset 0 0 15px #1e1b4b, 0 0 5px #c7d2fe; 
            border: 2px solid #e0e7ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 內建圖示模組 ---
        const VolumeIcon = ({ className = "w-6 h-6 md:w-8 md:h-8" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        );
        const RefreshIcon = ({ className = "w-6 h-6 md:w-8 md:h-8" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        );
        const CheckIcon = ({ className = "w-8 h-8 md:w-10 md:h-10" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const HeartIcon = ({ fill = "none", className = "w-24 h-24 md:w-40 md:h-40 lg:w-48 lg:h-48" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        );
        const SettingsIcon = ({ className = "w-4 h-4 md:w-5 md:h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        );
        const TypeIcon = ({ className = "w-4 h-4 md:w-5 md:h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
        );
        const GamepadIcon = ({ className = "w-5 h-5 md:w-6 md:h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
        );
        const KeyboardIcon = ({ className = "w-5 h-5 md:w-6 md:h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6.01" y2="8"></line><line x1="10" y1="8" x2="10.01" y2="8"></line><line x1="14" y1="8" x2="14.01" y2="8"></line><line x1="18" y1="8" x2="18.01" y2="8"></line><line x1="6" y1="12" x2="6.01" y2="12"></line><line x1="10" y1="12" x2="10.01" y2="12"></line><line x1="14" y1="12" x2="14.01" y2="12"></line><line x1="18" y1="12" x2="18.01" y2="12"></line><line x1="7" y1="16" x2="17" y2="16"></line></svg>
        );

        let globalAudioCtx = null;

        const App = () => {
          const [currentStep, setCurrentStep] = useState('checkIn');
          const [selectedEmotion, setSelectedEmotion] = useState(null);
          const [selectedStrategy, setSelectedStrategy] = useState(null);
          const [pitch, setPitch] = useState(1);
          const [voices, setVoices] = useState([]);
          const [selectedVoiceURI, setSelectedVoiceURI] = useState('');
          const [font, setFont] = useState('sans');
          const [isTransitioning, setIsTransitioning] = useState(false);
          const [qrCodeUrl, setQrCodeUrl] = useState(''); 

          const [gamepadConnected, setGamepadConnected] = useState(false);
          const [keyboardActive, setKeyboardActive] = useState(false);
          const [focusIndex, setFocusIndex] = useState(0); 
          const [popTrigger, setPopTrigger] = useState(0); 
          
          const appStateRef = useRef({ currentStep, focusIndex });
          useEffect(() => {
            appStateRef.current = { currentStep, focusIndex };
          }, [currentStep, focusIndex]);

          useEffect(() => {
            setFocusIndex(0);
          }, [currentStep]);

          useEffect(() => {
            if (typeof window !== 'undefined') {
              const currentHref = window.location.href;
              const targetUrl = currentHref.startsWith('http') ? currentHref : 'https://github.com';
              setQrCodeUrl(`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(targetUrl)}`);
            }
          }, []);

          useEffect(() => {
            const unlockAudio = () => {
              try {
                if (!globalAudioCtx) {
                  globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (globalAudioCtx.state === 'suspended') {
                  globalAudioCtx.resume();
                }
                const osc = globalAudioCtx.createOscillator();
                const gainNode = globalAudioCtx.createGain();
                gainNode.gain.value = 0; 
                osc.connect(gainNode);
                gainNode.connect(globalAudioCtx.destination);
                osc.start(0);
                osc.stop(globalAudioCtx.currentTime + 0.001);
              } catch(e) {}
              
              window.removeEventListener('touchstart', unlockAudio);
              window.removeEventListener('click', unlockAudio);
            };

            window.addEventListener('touchstart', unlockAudio, { once: true });
            window.addEventListener('click', unlockAudio, { once: true });

            return () => {
              window.removeEventListener('touchstart', unlockAudio);
              window.removeEventListener('click', unlockAudio);
            };
          }, []);

          useEffect(() => {
            const handleKeyDown = (e) => {
              const state = appStateRef.current;
              const maxIndex = state.currentStep === 'coolDown' ? 4 
                              : (state.currentStep === 'checkIn' || state.currentStep === 'strategy') ? 2 
                              : 0;

              if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                setKeyboardActive(true);
                setFocusIndex(prev => Math.max(0, prev - 1));
              } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                setKeyboardActive(true);
                setFocusIndex(prev => Math.min(maxIndex, prev + 1));
              } else if (e.key === 'Enter' || e.key === ' ') {
                if (e.key === ' ') e.preventDefault();
                setKeyboardActive(true);
                const targetButton = document.getElementById(`item-${state.focusIndex}`);
                if (targetButton) targetButton.click();
              } else {
                if (state.currentStep === 'coolDown' && state.focusIndex === 0) {
                   setKeyboardActive(true);
                   setPopTrigger(t => t + 1);
                }
              }
            };

            const disableKeyboardFocus = () => setKeyboardActive(false);

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('mousedown', disableKeyboardFocus);
            window.addEventListener('touchstart', disableKeyboardFocus);

            return () => {
              window.removeEventListener('keydown', handleKeyDown);
              window.removeEventListener('mousedown', disableKeyboardFocus);
              window.removeEventListener('touchstart', disableKeyboardFocus);
            };
          }, []);

          useEffect(() => {
            let rAF;
            let prevBtns = Array(20).fill(false);
            let prevAxes = [0, 0, 0, 0];

            const pollGamepad = () => {
              const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
              const gp = gamepads.find(g => g !== null);

              if (gp) {
                if (!gamepadConnected) {
                  setGamepadConnected(true);
                  setKeyboardActive(false); 
                }

                const pressed = gp.buttons.map(b => b.pressed);
                const state = appStateRef.current;
                const maxIndex = state.currentStep === 'coolDown' ? 4 
                                : (state.currentStep === 'checkIn' || state.currentStep === 'strategy') ? 2 
                                : 0;

                const left = pressed[14] || gp.axes[0] < -0.5;
                const right = pressed[15] || gp.axes[0] > 0.5;
                const prevLeft = prevBtns[14] || prevAxes[0] < -0.5;
                const prevRight = prevBtns[15] || prevAxes[0] > 0.5;

                if (left && !prevLeft) setFocusIndex(prev => Math.max(0, prev - 1));
                if (right && !prevRight) setFocusIndex(prev => Math.min(maxIndex, prev + 1));

                const select = pressed[0];
                const prevSelect = prevBtns[0];

                if (select && !prevSelect) {
                   const targetButton = document.getElementById(`item-${state.focusIndex}`);
                   if (targetButton) targetButton.click();
                }

                const anyOtherPress = pressed.some((p, i) => p && i !== 0 && !prevBtns[i]);
                if (anyOtherPress && state.currentStep === 'coolDown' && state.focusIndex === 0) {
                   setPopTrigger(t => t + 1);
                }

                prevBtns = pressed;
                prevAxes = [...gp.axes];
              } else {
                if (gamepadConnected) setGamepadConnected(false);
              }
              rAF = requestAnimationFrame(pollGamepad);
            };

            rAF = requestAnimationFrame(pollGamepad);
            return () => cancelAnimationFrame(rAF);
          }, [gamepadConnected]);

          const getFontFamily = () => {
            switch(font) {
              case 'kai': return '"BiauKai", "DFKai-sb", serif';
              case 'round': return '"cwTeXYen", "Arial Rounded MT Bold", "Varela Round", sans-serif';
              case 'zhuyin': return '"文鼎標楷注音", "AR BiauKai Zhuyin", "BPMF Kai", "BPMF", "王漢宗中明注音體", "王漢宗中楷注音", "DFBopomofo-W5", "BiauKai", serif';
              case 'sans':
              default: return 'ui-sans-serif, system-ui, sans-serif';
            }
          };

          const Fix = ({ char, z }) => {
            if (font !== 'zhuyin') return <React.Fragment>{char}</React.Fragment>;
            return (
              <span className="relative inline-flex items-center justify-center mr-[0.6em]" style={{ fontFamily: '"BiauKai", "DFKai-sb", serif' }}>
                <span>{char}</span>
                <span className="absolute left-full top-1/2 -translate-y-1/2 flex flex-col items-center justify-center text-[0.35em] leading-tight ml-[2px] tracking-tighter">
                  {z.split('').map((symbol, i) => (
                    <span key={i} className="block text-center font-normal">{symbol}</span>
                  ))}
                </span>
              </span>
            );
          };

          useEffect(() => {
            const loadVoices = () => {
              const availableVoices = window.speechSynthesis.getVoices();
              let chineseVoices = availableVoices.filter(v => v.lang.includes('zh'));

              chineseVoices.sort((a, b) => {
                const getScore = (v) => {
                  if (v.name.includes('Google 國語') || v.name.includes('Google Mandarin')) return 10;
                  if (v.name.includes('Mei-Jia')) return 9; 
                  if (v.name.includes('Hanhan')) return 8;  
                  if (v.name.includes('Xiaoxiao')) return 7; 
                  if (v.name.includes('Yunjian')) return 6;
                  if (v.lang === 'zh-TW' || v.lang === 'zh_TW') return 5;
                  return 1; 
                };
                return getScore(b) - getScore(a);
              });

              chineseVoices = chineseVoices.slice(0, 5);
              setVoices(chineseVoices);
              
              if (chineseVoices.length > 0 && !selectedVoiceURI) {
                setSelectedVoiceURI(chineseVoices[0].voiceURI);
              }
            };

            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
              window.speechSynthesis.onvoiceschanged = loadVoices;
            }
          }, [selectedVoiceURI]);

          const speak = (text, onEndCallback = null) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'zh-TW';
              utterance.rate = 0.9;
              utterance.pitch = pitch;
              if (selectedVoiceURI) {
                const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                if (voice) utterance.voice = voice;
              }
              
              if (onEndCallback) {
                let isFired = false;
                const callback = () => {
                  if (!isFired) {
                    isFired = true;
                    onEndCallback();
                  }
                };
                utterance.onend = callback;
                utterance.onerror = callback; 
                setTimeout(callback, (text.length * 350) + 1500); 
              }
              window.speechSynthesis.speak(utterance);
            } else if (onEndCallback) {
              setTimeout(onEndCallback, 1500);
            }
          };

          const emotions = {
            green: { 
              id: 'green', color: 'bg-green-50 border-green-500 text-green-700 hover:bg-green-100', 
              icon: '😊', name: '綠燈', label: <React.Fragment>綠燈：平靜、開心</React.Fragment>, 
              desc: <React.Fragment>我現在感<Fix char="覺" z="ㄐㄩㄝˊ"/>很好，可以專心上課。</React.Fragment>,
              speech: '我現在感覺很好，是綠燈。'
            },
            yellow: { 
              id: 'yellow', color: 'bg-yellow-50 border-yellow-500 text-yellow-800 hover:bg-yellow-100', 
              icon: '😟', name: '黃燈', label: <React.Fragment>黃燈：緊張、煩躁</React.Fragment>, 
              desc: <React.Fragment>我有點不舒服，需要一點幫助。</React.Fragment>,
              speech: '我有點煩躁或緊張，是黃燈。'
            },
            red: { 
              id: 'red', color: 'bg-red-50 border-red-500 text-red-700 hover:bg-red-100', 
              icon: '😡', name: '紅燈', label: <React.Fragment>紅燈：生氣、失控</React.Fragment>, 
              desc: <React.Fragment>我非常生氣！我需要馬上休息！</React.Fragment>,
              speech: '我非常生氣！是紅燈。'
            }
          };

          const strategies = {
            yellow: [
              { id: 'water', icon: '🥤', label: <React.Fragment>喝口水</React.Fragment>, speech: '喝口水', toolType: 'timer', time: 10 },
              { id: 'breathe', icon: '🌬️', label: <React.Fragment>深呼吸</React.Fragment>, speech: '深呼吸', toolType: 'breathing' },
              { id: 'stretch', icon: '🤸', label: <React.Fragment>伸展身體</React.Fragment>, speech: '伸展身體', toolType: 'timer', time: 15 }
            ],
            red: [
              { id: 'quiet', icon: '🪑', label: <React.Fragment>去冷靜區</React.Fragment>, speech: '去冷靜區', toolType: 'timer', time: 20 },
              { id: 'headphones', icon: '🎧', label: <React.Fragment>聽音<Fix char="樂" z="ㄩㄝˋ"/></React.Fragment>, speech: '聽音樂', toolType: 'music', time: 20 },
              { id: 'toy', icon: '🧸', label: <React.Fragment>按紓壓泡泡</React.Fragment>, speech: '來按紓壓泡泡吧，你還可以選擇不同款式喔！', toolType: 'popit' }
            ]
          };

          const handleEmotionSelect = (emotionId) => {
            if (isTransitioning) return;
            setIsTransitioning(true);
            const emotion = emotions[emotionId];
            setSelectedEmotion(emotion);
            
            speak(emotion.speech, () => {
              if (emotionId === 'green') {
                setCurrentStep('wellDone');
                speak('太棒了！保持這個好心情繼續學習吧！');
              } else {
                setCurrentStep('strategy');
                speak('你需要什麼幫助呢？請選一個方法。');
              }
              setIsTransitioning(false);
            });
          };

          const handleStrategySelect = (strategy) => {
            if (isTransitioning) return;
            setIsTransitioning(true);
            setSelectedStrategy(strategy);
            
            speak(strategy.speech, () => {
              setCurrentStep('coolDown');
              setIsTransitioning(false);
            });
          };

          const resetApp = () => {
            if (isTransitioning) return;
            setCurrentStep('checkIn');
            setSelectedEmotion(null);
            setSelectedStrategy(null);
            speak('你現在感覺怎麼樣？');
          };

          // 🏆 設定面板
          const SettingsPanel = () => (
            <div className="absolute top-4 right-4 md:top-6 md:right-6 z-50 flex flex-col gap-2 items-end">
              {voices.length > 0 && (
                <select
                  value={selectedVoiceURI}
                  onChange={(e) => {
                    setSelectedVoiceURI(e.target.value);
                    if ('speechSynthesis' in window) {
                      window.speechSynthesis.cancel();
                      const u = new SpeechSynthesisUtterance('這是我新的聲音，聽起來親切嗎？');
                      const selectedV = voices.find(v => v.voiceURI === e.target.value);
                      if (selectedV) u.voice = selectedV;
                      u.pitch = pitch;
                      u.rate = 0.9;
                      window.speechSynthesis.speak(u);
                    }
                  }}
                  className="bg-white/90 px-3 py-2 md:px-4 md:py-2.5 rounded-xl shadow-md text-xs md:text-sm font-bold text-gray-700 border-2 border-gray-200 outline-none cursor-pointer w-[140px] md:w-[180px] truncate"
                  title="選擇發音人"
                >
                  {voices.map(v => (
                    <option key={v.voiceURI} value={v.voiceURI}>
                      🗣️ {v.name}
                    </option>
                  ))}
                </select>
              )}

              <div className="flex gap-2">
                <button
                  onClick={() => {
                    const nextFont = font === 'sans' ? 'kai' : font === 'kai' ? 'round' : font === 'round' ? 'zhuyin' : 'sans';
                    setFont(nextFont);
                  }}
                  className="flex items-center gap-1.5 bg-white/90 px-3 py-2 md:px-4 md:py-2.5 rounded-full shadow-md text-xs md:text-sm font-bold text-gray-700 hover:bg-gray-50 border-2 border-gray-200 transition-all focus:outline-none"
                  title="切換字體"
                >
                  <TypeIcon />
                  {font === 'sans' ? '黑體' : font === 'kai' ? '標楷' : font === 'round' ? '圓體' : '注音'}
                </button>

                <button
                  onClick={() => {
                    const nextPitch = pitch === 1 ? 1.5 : pitch === 1.5 ? 0.8 : 1;
                    setPitch(nextPitch);
                    if ('speechSynthesis' in window) {
                      window.speechSynthesis.cancel();
                      const u = new SpeechSynthesisUtterance(nextPitch === 1 ? '正常音調' : nextPitch === 1.5 ? '可愛高音' : '沉穩低音');
                      if (selectedVoiceURI) {
                        const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                        if (voice) u.voice = voice;
                      }
                      u.lang = 'zh-TW';
                      u.rate = 0.9;
                      u.pitch = nextPitch;
                      window.speechSynthesis.speak(u);
                    }
                  }}
                  className="flex items-center gap-1.5 bg-white/90 px-3 py-2 md:px-4 md:py-2.5 rounded-full shadow-md text-xs md:text-sm font-bold text-gray-700 hover:bg-gray-50 border-2 border-gray-200 transition-all focus:outline-none"
                  title="切換語音音調"
                >
                  <SettingsIcon />
                  音調
                </button>
              </div>
            </div>
          );

          const getFocusStyle = (index) => {
            return (gamepadConnected || keyboardActive) && focusIndex === index 
              ? 'ring-4 md:ring-8 ring-blue-500 ring-offset-2 md:ring-offset-4 scale-105 z-10 transform transition-all border-blue-500' 
              : '';
          };

          // 🏆 紓壓泡泡工具 (加入正確 CSS 樣式生成與滑動阻斷)
          const PopItTool = ({ trigger }) => {
            const totalBubbles = 24;
            const [bubbles, setBubbles] = useState(Array(totalBubbles).fill(false));
            const [activeStyle, setActiveStyle] = useState('classic'); 

            const bubblePopStyles = {
              classic: { name: 'classic', label: '🩷 經典粉', gridBg: 'bg-pink-50 border-pink-200' },
              rainbow: { name: 'rainbow', label: '🌈 彩虹格子', gridBg: 'bg-sky-50 border-sky-200' },
              glow: { name: 'glow', label: '✨ 發光藍', gridBg: 'bg-indigo-50 border-indigo-200' }
            };

            const activeStyleConfig = bubblePopStyles[activeStyle];
            const speakStylePrompt = () => speak('來按紓壓泡泡吧，你可以選擇不同款式喔！');

            const playPopSound = (isPop) => {
              try {
                if (!globalAudioCtx) {
                  globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (globalAudioCtx.state === 'suspended') {
                  globalAudioCtx.resume();
                }
                const osc = globalAudioCtx.createOscillator();
                const gainNode = globalAudioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(isPop ? 600 : 400, globalAudioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(isPop ? 300 : 200, globalAudioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, globalAudioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, globalAudioCtx.currentTime + 0.1);
                osc.connect(gainNode);
                gainNode.connect(globalAudioCtx.destination);
                osc.start();
                osc.stop(globalAudioCtx.currentTime + 0.1);
              } catch (e) { console.log("音效播放失敗", e); }
            };

            const toggle = (i) => {
              setBubbles(prev => {
                const next = [...prev];
                next[i] = !next[i];
                playPopSound(next[i]);
                return next;
              });
            };

            useEffect(() => {
              if (currentStep === 'coolDown' && selectedStrategy.id === 'toy') {
                speakStylePrompt();
              }
            }, [currentStep, selectedStrategy]);

            useEffect(() => {
              if (trigger > 0) {
                setBubbles(prev => {
                  const next = [...prev];
                  const unpopped = next.map((b, i) => !b ? i : -1).filter(i => i !== -1);
                  if (unpopped.length === 0) {
                    playPopSound(false);
                    return Array(totalBubbles).fill(false);
                  }
                  const randomTarget = unpopped[Math.floor(Math.random() * unpopped.length)];
                  next[randomTarget] = true;
                  playPopSound(true);
                  return next;
                });
              }
            }, [trigger]);

            // 🏆 根據當前選擇動態組合 CSS Class，確保效果成功套用
            const getBubbleClass = (popped, index) => {
              const baseClass = "w-10 h-10 sm:w-12 sm:h-12 md:w-16 md:h-16 lg:w-20 lg:h-20 max-w-[8vh] max-h-[8vh] aspect-square rounded-full transition-all duration-200 shadow-md md:shadow-lg mx-auto focus:outline-none touch-none ";
              
              if (activeStyle === 'classic') {
                  return baseClass + (popped ? 'bg-pink-400 scale-90 shadow-inner' : 'bg-pink-200 hover:bg-pink-300 scale-100');
              }
              if (activeStyle === 'rainbow') {
                  return baseClass + (popped ? 'bg-gray-200 scale-90 shadow-inner opacity-50' : `bubble-color-${index % 6} scale-100 hover:opacity-80`);
              }
              if (activeStyle === 'glow') {
                  return baseClass + (popped ? 'glow-popped scale-90' : 'glow-bubble scale-100 hover:brightness-125');
              }
              return baseClass;
            };

            return (
              <div className="flex flex-col items-center w-full mt-2 md:mt-4 mb-6 md:mb-10">
                <div className="bg-white/90 p-4 md:p-6 lg:p-8 rounded-2xl md:rounded-3xl mb-4 md:mb-6 shadow-sm border-2 md:border-4 border-gray-200 z-10 touch-none">
                  <div className="flex items-center justify-center gap-3 md:gap-5 mb-3 md:mb-5">
                    <span className="text-3xl md:text-5xl animate-bounce">🧸</span>
                    <span className="text-xl md:text-3xl font-bold text-gray-800 tracking-wider">選擇泡泡款式</span>
                    <button onClick={speakStylePrompt} className="text-gray-400 hover:text-gray-600 focus:outline-none">
                       <VolumeIcon />
                    </button>
                  </div>
                  
                  <div className="flex flex-wrap justify-center gap-3 md:gap-5">
                     {Object.values(bubblePopStyles).map((m, idx) => (
                       <button 
                         id={`item-${idx + 1}`} 
                         key={m.name} 
                         onClick={() => { setActiveStyle(m.name); speak(`你選擇了${m.label}。`); }} 
                         disabled={isTransitioning}
                         className={`py-2 px-4 md:py-3 md:px-6 ${m.name === activeStyle ? 'bg-blue-100 border-blue-400 text-blue-800' : 'bg-white border-indigo-100 text-indigo-700 hover:bg-indigo-50'} border-2 md:border-4 rounded-xl text-sm md:text-xl font-bold shadow-sm transition-all focus:outline-none flex items-center justify-center gap-2 touch-none ${getFocusStyle(idx + 1)}`}
                       >
                         {m.label}
                         {m.name === 'glow' && <span className="animate-pulse">✨</span>}
                       </button>
                     ))}
                  </div>
                </div>

                <div id="item-0" 
                     className={`grid grid-cols-6 gap-3 sm:gap-4 md:gap-6 lg:gap-8 p-4 sm:p-6 md:p-8 lg:p-12 rounded-[1.5rem] md:rounded-[3rem] border-4 md:border-[8px] shadow-inner focus:outline-none m-2 md:m-8 touch-none ${activeStyleConfig.gridBg} ${getFocusStyle(0)}`}
                     style={{ touchAction: 'none' }}
                >
                  {bubbles.map((popped, i) => (
                    <button
                      key={i}
                      onClick={() => toggle(i)}
                      className={getBubbleClass(popped, i)}
                      style={{ touchAction: 'none' }}
                    />
                  ))}
                </div>
              </div>
            );
          };

          // 🏆 呼吸工具
          const BreathingTool = () => {
            const [phase, setPhase] = useState('吸氣');
            useEffect(() => {
              const interval = setInterval(() => {
                setPhase(p => p === '吸氣' ? '吐氣' : '吸氣');
              }, 4000);
              return () => clearInterval(interval);
            }, []);

            return (
              <div className="flex flex-col items-center justify-center mt-4 md:mt-8 mb-6 md:mb-10">
                <div className="relative w-40 h-40 md:w-56 md:h-56 lg:w-72 lg:h-72 max-w-[30vh] max-h-[30vh] aspect-square flex items-center justify-center">
                  <div className={`absolute w-full h-full bg-blue-300 rounded-full opacity-40 transition-all duration-[4000ms] ease-in-out ${phase === '吸氣' ? 'scale-150 md:scale-[1.6]' : 'scale-75'}`}></div>
                  <div className={`absolute w-[75%] h-[75%] bg-blue-500 rounded-full shadow-xl flex items-center justify-center transition-all duration-[4000ms] ease-in-out ${phase === '吸氣' ? 'scale-125 md:scale-[1.3]' : 'scale-90'}`}>
                     <span className="text-white text-3xl md:text-5xl lg:text-6xl font-bold tracking-widest">{phase}</span>
                  </div>
                </div>
                <p className="mt-12 md:mt-20 lg:mt-28 text-xl md:text-3xl text-gray-600 font-bold animate-pulse">跟著氣球慢慢呼吸...</p>
              </div>
            );
          };

          // 🏆 倒數工具
          const VisualTimer = ({ seconds }) => {
            const [timeLeft, setTimeLeft] = useState(seconds);
            useEffect(() => {
              if (timeLeft <= 0) return;
              const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
              return () => clearInterval(timer);
            }, [timeLeft]);

            const percentage = (timeLeft / seconds) * 100;
            
            return (
              <div className="flex flex-col items-center mt-4 md:mt-8 mb-6 md:mb-10">
                <div 
                  className="relative w-40 h-40 md:w-56 md:h-56 lg:w-72 lg:h-72 max-w-[30vh] max-h-[30vh] aspect-square rounded-full bg-gray-200 border-8 md:border-[16px] border-gray-100 flex items-center justify-center overflow-hidden transition-all duration-1000 shadow-lg" 
                  style={{ background: `conic-gradient(#4ADE80 ${percentage}%, #E5E7EB ${percentage}%)` }}
                >
                  <div className="w-[70%] h-[70%] bg-white rounded-full flex items-center justify-center shadow-inner">
                    <span className="text-4xl md:text-5xl lg:text-6xl font-bold text-gray-700">{timeLeft}s</span>
                  </div>
                </div>
                <p className="mt-6 md:mt-8 text-lg md:text-2xl text-gray-500 font-bold">休息一下，等綠色倒<Fix char="數" z="ㄕㄨˇ"/>完畢...</p>
              </div>
            );
          };

          // 🏆 音樂工具
          const MusicTool = ({ seconds }) => {
            const [audioSrc, setAudioSrc] = useState(null);
            const [musicName, setMusicName] = useState('專屬冷靜音樂');
            const fileInputRef = useRef(null);

            const builtInMusic = [
              { id: 1, name: '🌲 放輕鬆', url: './music1.mp3' },
              { id: 2, name: '🌊 溫暖', url: './music2.mp3' },
              { id: 3, name: '☀️ 積極正向', url: './music3.mp3' }
            ];

            const handleFileChange = (e) => {
              const file = e.target.files[0];
              if (file) {
                const url = URL.createObjectURL(file);
                setAudioSrc(url);
                setMusicName('自訂：' + file.name);
              }
            };

            const handleSelectBuiltIn = (music) => {
              setAudioSrc(music.url);
              setMusicName(music.name);
            };

            useEffect(() => {
              return () => {
                if (audioSrc && audioSrc.startsWith('blob:')) URL.revokeObjectURL(audioSrc);
              };
            }, [audioSrc]);

            return (
              <div className="flex flex-col items-center w-full mt-2 md:mt-4 mb-6 md:mb-10">
                <div className="bg-blue-50 p-4 md:p-6 lg:p-8 rounded-3xl mb-2 shadow-md border-4 border-blue-200 w-full max-w-2xl lg:max-w-3xl">
                  <div className="flex items-center justify-center gap-3 md:gap-5 mb-2 md:mb-4">
                    <span className="text-3xl md:text-4xl animate-bounce">🎵</span>
                    <span className="text-3xl md:text-4xl animate-bounce" style={{ animationDelay: '0.2s' }}>🎧</span>
                    <span className="text-3xl md:text-4xl animate-bounce" style={{ animationDelay: '0.4s' }}>🧸</span>
                  </div>
                  <p className="text-blue-800 font-bold text-xl md:text-2xl tracking-wider w-full text-center mb-3 md:mb-5 truncate">{musicName}</p>
                  
                  {audioSrc ? (
                    <div className="w-full flex flex-col items-center gap-2 md:gap-4">
                      <audio controls autoPlay loop className="w-full h-10 md:h-12 rounded-full shadow-inner outline-none" src={audioSrc}>
                        您的瀏覽器不支援音樂播放
                      </audio>
                      <button onClick={() => { setAudioSrc(null); setMusicName('專屬冷靜音樂'); }} className="text-sm md:text-lg text-gray-500 hover:text-blue-600 underline font-bold mt-1">
                        換一首音樂
                      </button>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center w-full animate-fade-in">
                      <div className="flex flex-wrap justify-center gap-2 md:gap-4 w-full mb-3 md:mb-5">
                         {builtInMusic.map(m => (
                           <button 
                             key={m.id} 
                             onClick={() => handleSelectBuiltIn(m)} 
                             className="py-2 px-3 md:py-3 md:px-5 bg-white border-2 md:border-4 border-indigo-200 text-indigo-700 rounded-xl md:rounded-2xl hover:bg-indigo-50 text-base md:text-xl font-bold shadow-sm transition-colors focus:outline-none"
                           >
                             {m.name}
                           </button>
                         ))}
                      </div>
                      
                      <div className="w-full border-t-2 md:border-t-4 border-gray-300 my-2 md:my-4 relative">
                         <span className="absolute left-1/2 -translate-x-1/2 -top-3 md:-top-4 bg-blue-50 px-2 md:px-4 text-xs md:text-lg text-gray-400 font-bold">或</span>
                      </div>

                      <input type="file" accept="audio/*" className="hidden" ref={fileInputRef} onChange={handleFileChange} />
                      <button 
                        onClick={() => fileInputRef.current.click()}
                        className="w-full py-2 md:py-4 bg-indigo-500 text-white rounded-xl md:rounded-2xl hover:bg-indigo-600 shadow-md transform hover:scale-[1.02] transition-all text-lg md:text-xl font-bold flex items-center justify-center gap-2 focus:outline-none mt-1"
                      >
                        📁 載入本機音檔
                      </button>
                    </div>
                  )}
                </div>
                <VisualTimer seconds={seconds} />
              </div>
            );
          };

          const getBgColor = () => {
            switch(currentStep) {
              case 'checkIn': return 'bg-sky-50';
              case 'strategy': return 'bg-blue-50';
              case 'coolDown': return 'bg-indigo-50';
              case 'wellDone': return 'bg-green-50';
              default: return 'bg-sky-50';
            }
          };

          // --- 渲染畫面 ---
          return (
            <div className={`w-screen h-screen flex flex-col items-center justify-center relative overflow-hidden transition-colors duration-[1000ms] ${getBgColor()} p-4 md:p-8`} style={{ fontFamily: getFontFamily() }}>
              
              <SettingsPanel />
              
              {/* 控制器連接提示 */}
              {(gamepadConnected || keyboardActive) && (
                <div className="absolute top-4 left-4 md:top-6 md:left-6 z-50 flex items-center gap-2 bg-green-100 text-green-700 px-3 py-1.5 md:px-5 md:py-2.5 rounded-full shadow-md border-2 md:border-4 border-green-300 font-bold text-xs md:text-lg animate-bounce">
                  {gamepadConnected ? <GamepadIcon /> : <KeyboardIcon />}
                  {gamepadConnected ? "已偵測到遊戲手把" : "已啟用鍵盤操作"}
                </div>
              )}

              {/* 🏆 QR Code 智能隱藏 (僅在 checkIn 顯示) */}
              {currentStep === 'checkIn' && (
                <div className="absolute bottom-4 left-4 md:bottom-6 md:left-6 z-40 hidden sm:flex flex-col items-center bg-white/90 p-2 md:p-3 rounded-xl md:rounded-2xl shadow-md border-2 border-blue-200">
                  {qrCodeUrl && <img src={qrCodeUrl} alt="QR Code" className="w-16 h-16 md:w-24 md:h-24 lg:w-28 lg:h-28" />}
                  <span className="text-[10px] md:text-xs text-blue-800 font-bold mt-1 tracking-wider">平板掃碼開啟</span>
                </div>
              )}

              {/* 畫面一：情緒大廳 */}
              {currentStep === 'checkIn' && (
                <div className="w-full h-full max-w-7xl max-h-[95vh] flex flex-col p-4 md:p-8 text-center justify-center animate-fade-in bg-white/40 rounded-[2rem] md:rounded-[3rem] shadow-sm backdrop-blur-sm">
                  <div className="flex items-center justify-center gap-3 md:gap-6 mb-6 md:mb-12 shrink-0">
                    <h1 className="text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-extrabold text-blue-800 drop-shadow-sm">你現在感<Fix char="覺" z="ㄐㄩㄝˊ"/>怎麼樣？</h1>
                    <button 
                      onClick={() => speak('你現在感覺怎麼樣？')}
                      className={`p-2 md:p-4 bg-blue-100 text-blue-600 rounded-full transition-colors focus:outline-none shadow-sm ${isTransitioning ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-200 hover:scale-110'}`}
                      disabled={isTransitioning}
                    >
                      <VolumeIcon />
                    </button>
                  </div>
                  
                  <div className="flex flex-col sm:flex-row gap-4 md:gap-8 flex-1 min-h-0 w-full">
                    {Object.values(emotions).map((emo, idx) => (
                      <button
                        id={`item-${idx}`}
                        key={emo.id}
                        onClick={() => handleEmotionSelect(emo.id)}
                        disabled={isTransitioning}
                        className={`flex-1 flex flex-col items-center justify-center p-4 md:p-8 rounded-2xl md:rounded-[2.5rem] border-4 md:border-8 transition-all focus:outline-none shadow-md bg-white/80 ${isTransitioning ? 'opacity-50 cursor-not-allowed' : 'hover:scale-[1.03] hover:-translate-y-2'} ${emo.color} ${getFocusStyle(idx)}`}
                      >
                        <span className="text-6xl sm:text-7xl md:text-8xl lg:text-9xl mb-3 md:mb-6 drop-shadow-md">{emo.icon}</span>
                        <span className="text-xl sm:text-2xl md:text-4xl font-bold mb-2 md:mb-4">{emo.label}</span>
                        <span className="text-sm sm:text-base md:text-xl opacity-80 font-medium px-2">{emo.desc}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* 畫面二：選擇策略 */}
              {currentStep === 'strategy' && (
                <div className="w-full h-full max-w-7xl max-h-[95vh] flex flex-col p-4 md:p-8 text-center justify-center animate-fade-in bg-white/40 rounded-[2rem] md:rounded-[3rem] shadow-sm backdrop-blur-sm">
                  <div className="mb-6 md:mb-12 shrink-0 flex flex-col items-center">
                    <span className="text-5xl sm:text-6xl md:text-8xl lg:text-9xl mb-4 md:mb-6 block drop-shadow-md">{selectedEmotion.icon}</span>
                    <div className="flex items-center justify-center gap-3 md:gap-5">
                      <h2 className="text-2xl sm:text-3xl md:text-5xl font-extrabold text-gray-800">你現在是{selectedEmotion.name}，請選一個方法：</h2>
                      <button 
                        onClick={() => speak('請選一個方法幫助自己')}
                        className={`p-2 md:p-3 bg-white/80 text-gray-600 rounded-full transition-colors focus:outline-none shadow-sm ${isTransitioning ? 'opacity-50' : 'hover:bg-gray-100 hover:scale-110'}`}
                        disabled={isTransitioning}
                      >
                        <VolumeIcon />
                      </button>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4 md:gap-8 flex-1 min-h-0 w-full">
                    {strategies[selectedEmotion.id].map((strat, idx) => (
                      <button
                        id={`item-${idx}`}
                        key={strat.id}
                        onClick={() => handleStrategySelect(strat)}
                        disabled={isTransitioning}
                        className={`flex-1 flex flex-col items-center justify-center p-4 md:p-8 bg-white/80 border-4 md:border-8 border-indigo-200 rounded-2xl md:rounded-[2.5rem] transition-all focus:outline-none shadow-md ${isTransitioning ? 'opacity-50' : 'hover:bg-indigo-50 hover:border-indigo-400 hover:scale-[1.03] hover:-translate-y-2'} ${getFocusStyle(idx)}`}
                      >
                        <span className="text-5xl sm:text-6xl md:text-8xl lg:text-9xl mb-4 md:mb-8 drop-shadow-md">{strat.icon}</span>
                        <span className="text-lg sm:text-xl md:text-3xl lg:text-4xl font-extrabold text-indigo-900">{strat.label}</span>
                      </button>
                    ))}
                  </div>

                  <button 
                    onClick={resetApp}
                    disabled={isTransitioning}
                    className="mt-6 md:mt-10 px-6 py-3 md:px-10 md:py-5 bg-white/80 text-gray-700 text-base md:text-2xl font-bold rounded-full hover:bg-gray-100 flex items-center justify-center mx-auto gap-2 md:gap-4 shrink-0 focus:outline-none shadow-md transition-transform hover:scale-105 border-2 border-gray-200"
                  >
                    <RefreshIcon /> 重新選擇心情
                  </button>
                </div>
              )}

              {/* 畫面三：執行冷靜 (防捲動鎖死設計) */}
              {currentStep === 'coolDown' && (
                <div className="w-full h-full max-w-6xl max-h-[95vh] flex flex-col p-4 md:p-8 text-center animate-fade-in bg-white/40 rounded-[2rem] md:rounded-[3rem] shadow-sm backdrop-blur-sm overflow-hidden">
                  <h2 className="text-2xl sm:text-3xl md:text-5xl font-extrabold text-indigo-900 mb-2 md:mb-4 flex justify-center items-center gap-3 md:gap-5 shrink-0 relative focus:outline-none drop-shadow-sm">
                    {selectedStrategy.label}
                    <button onClick={() => speak(selectedStrategy.speech)} className="text-indigo-500 hover:text-indigo-700 focus:outline-none relative z-20 bg-white/50 p-2 rounded-full">
                       <VolumeIcon />
                    </button>
                  </h2>
                  
                  <div className="flex-1 flex flex-col items-center justify-center w-full min-h-0 overflow-hidden py-4 md:py-8 px-2 md:px-8">
                    {selectedStrategy.toolType === 'popit' && <PopItTool trigger={popTrigger} />}
                    {selectedStrategy.toolType === 'breathing' && <BreathingTool />}
                    {selectedStrategy.toolType === 'timer' && <VisualTimer seconds={selectedStrategy.time} />}
                    {selectedStrategy.toolType === 'music' && <MusicTool seconds={selectedStrategy.time} />}
                  </div>

                  <button 
                    id="item-4"
                    onClick={() => {
                      if (isTransitioning) return;
                      setCurrentStep('wellDone');
                      speak('我感覺好多了！太棒了！');
                    }}
                    className={`w-full max-w-4xl mx-auto py-4 md:py-6 bg-green-500 text-white text-xl md:text-4xl font-extrabold rounded-2xl md:rounded-[2.5rem] hover:bg-green-600 shadow-xl transform hover:scale-[1.02] transition-all flex justify-center items-center gap-3 md:gap-6 mt-4 md:mt-6 shrink-0 z-20 relative focus:outline-none border-4 border-green-400 ${getFocusStyle(4)}`}
                  >
                    <CheckIcon /> 我感覺好多了！
                  </button>
                </div>
              )}

              {/* 畫面四：完成鼓勵 */}
              {currentStep === 'wellDone' && (
                <div className="w-full h-full max-w-5xl max-h-[95vh] flex flex-col items-center justify-center p-6 md:p-16 text-center animate-fade-in bg-white/40 rounded-[2rem] md:rounded-[3rem] shadow-sm backdrop-blur-sm">
                  <div className="text-red-500 flex justify-center mb-6 md:mb-10 animate-pulse drop-shadow-xl">
                    <HeartIcon fill="currentColor" />
                  </div>
                  <h1 className="text-5xl sm:text-6xl md:text-8xl lg:text-9xl font-extrabold text-green-700 mb-4 md:mb-8 drop-shadow-sm">太棒了！</h1>
                  <p className="text-xl sm:text-2xl md:text-4xl font-bold text-green-900 mb-10 md:mb-20 px-4">
                    你很棒，能察<Fix char="覺" z="ㄐㄩㄝˊ"/>自己的情緒，並且把自己照顧得很好！
                  </p>
                  
                  <button 
                    id="item-0"
                    onClick={resetApp}
                    className={`px-8 py-4 md:px-16 md:py-8 bg-blue-500 text-white text-xl md:text-4xl font-extrabold rounded-2xl md:rounded-[2.5rem] hover:bg-blue-600 shadow-xl transform hover:scale-[1.05] transition-all flex justify-center items-center mx-auto gap-3 md:gap-6 focus:outline-none border-4 border-blue-400 ${getFocusStyle(0)}`}
                  >
                    <RefreshIcon /> 回到首頁
                  </button>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
